name: Build Desktop Executables

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS Zip
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Bundle
        run: |
          python build.py

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyCloud-macOS
          path: |
            static/downloads/MyCloud-macOS.zip
            static/downloads/MyCloud-macOS.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows Exe
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Bundle
        run: |
          python build.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyCloud-Windows
          path: static/downloads/MyCloud-Windows.exe
          if-no-files-found: error
